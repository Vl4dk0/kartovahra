<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="felt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a3a40"/>
      <stop offset="1" stop-color="#1b1b1e"/>
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="30" height="30" rx="7" fill="url(#felt)" stroke="#e7b24b" stroke-width="1.5"/>
  <g fill="#faf4e8">
    <!-- two lower club lobes -->
    <circle cx="12.4" cy="22" r="4.3"/>
    <circle cx="19.6" cy="22" r="4.3"/>
    <!-- shaft = stretched club stem -->
    <rect x="12.7" y="9" width="6.6" height="14" rx="3.3"/>
    <!-- top club lobe -->
    <circle cx="16" cy="9.2" r="4.3"/>
  </g>
</svg>
